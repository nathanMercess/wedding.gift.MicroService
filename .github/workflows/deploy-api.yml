name: Deploy API

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    name: Build, Push and Deploy API
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write  # obrigatório para Workload Identity Federation

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate with Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: "projects/528711077873/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "github-actions@weddinggift.iam.gserviceaccount.com"

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker southamerica-east1-docker.pkg.dev --quiet

      - name: Build API image
        run: |
          docker build \
            -t southamerica-east1-docker.pkg.dev/weddinggift/wedding-gift/api:latest \
            -t southamerica-east1-docker.pkg.dev/weddinggift/wedding-gift/api:${{ github.sha }} \
            .

      - name: Push API image
        run: |
          docker push southamerica-east1-docker.pkg.dev/weddinggift/wedding-gift/api:latest
          docker push southamerica-east1-docker.pkg.dev/weddinggift/wedding-gift/api:${{ github.sha }}

      - name: Deploy to VM via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            gcloud auth configure-docker southamerica-east1-docker.pkg.dev --quiet
            docker pull southamerica-east1-docker.pkg.dev/weddinggift/wedding-gift/api:latest
            cd /home/nathan66merces/app
            docker compose up -d api
            docker image prune -f
