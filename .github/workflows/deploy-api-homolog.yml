name: Build and Deploy to Cloud Run (Homolog)

on:
  push:
    # Este workflow SÓ rodará quando houver commits na branch 'teste'
    branches:
      - teste

env:
  PROJECT_ID: weddinggift # Ex: meu-projeto-casamento
  GAR_LOCATION: southamerica-east1
  REPOSITORY: wedding-gift-api-repo # Ex: wedding-gift-repo
  SERVICE: wedding-gift-api-homolog # Nome do serviço de TESTE (diferente da prod)
  REGION: southamerica-east1

jobs:
  deploy:
    # Pode necessitar de adicionar permissões (permissions) dependendo 
    # de como a sua service account do Google Cloud está autenticada no GitHub.
    permissions:
      contents: 'read'
      id-token: 'write'

    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Autenticação no Google Cloud
      # Substitua pelo seu provedor de identidade (Workload Identity) 
      # ou credenciais em JSON (credentials_json) armazenadas nos Secrets do GitHub.
      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      # 2. Configurar o Docker para o Artifact Registry
      - name: Docker Auth
        run: |-
          gcloud auth configure-docker "${{ env.GAR_LOCATION }}-docker.pkg.dev"

      # 3. Construir a imagem Docker
      # Utiliza o SHA do commit para gerar uma tag única para a imagem de teste
      - name: Build Docker Image
        run: |-
          docker build -t "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE }}:${{ github.sha }}" ./src/wedding.gift.Application.Webapi

      # 4. Enviar a imagem para o Artifact Registry
      - name: Push Docker Image
        run: |-
          docker push "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE }}:${{ github.sha }}"

      # 5. Realizar o Deploy no Cloud Run
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE }}
          region: ${{ env.REGION }}
          image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.SERVICE }}:${{ github.sha }}
          # Flags essenciais para a API .NET no Cloud Run
          flags: |
            --allow-unauthenticated
            --memory=512Mi
            --cpu=1
            --concurrency=80
            --min-instances=0
            --max-instances=5
