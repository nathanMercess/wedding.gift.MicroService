name: Build, Test e Deploy

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  DOTNET_VERSION: '10.0.x'

jobs:
  build-and-test:
    name: Build e Testes
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      pull-requests: write

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ env.DOTNET_VERSION }}
    
    - name: Restaurar dependências
      run: dotnet restore
    
    - name: Build
      run: dotnet build --configuration Release --no-restore
    
    - name: Executar testes
      run: dotnet test --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx" --collect:"XPlat Code Coverage"

    - name: Publicar resultado dos testes
      uses: dorny/test-reporter@v1
      if: always()
      continue-on-error: true
      with:
        name: Test Results
        path: '**/TestResults/test-results.trx'
        reporter: dotnet-trx
        fail-on-error: false

  docker-build-and-push:
    name: Build e Push Docker Image
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    permissions:
      contents: read
      packages: write
    
    steps:
    - name: Checkout do código
      uses: actions/checkout@v4
    
    - name: Login no GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Extrair metadados Docker
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        tags: |
          type=ref,event=branch
          type=sha,prefix={{branch}}-
          type=raw,value=latest,enable={{is_default_branch}}
    
    - name: Build e Push da imagem Docker
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

  deploy-to-cloud-run:
    name: Deploy para Google Cloud Run
    needs: docker-build-and-push
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    permissions:
      contents: read
      id-token: write
      packages: read

    steps:
    - name: Checkout do código
      uses: actions/checkout@v4

    - name: Autenticar no Google Cloud
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: 'projects/528711077873/locations/global/workloadIdentityPools/github-actions-pool/providers/github-actions-provider'
        service_account: 'github-actions@weddinggift.iam.gserviceaccount.com'

    - name: Configurar Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Login no GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ${{ env.REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Configurar Docker para GCR
      run: gcloud auth configure-docker gcr.io

    - name: Pull e retag da imagem do GHCR para GCR
      run: |
        IMAGE_LOWERCASE=$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')
        docker pull ${IMAGE_LOWERCASE}:${{ github.sha }}
        docker tag ${IMAGE_LOWERCASE}:${{ github.sha }} gcr.io/weddinggift/weddinggift:${{ github.sha }}
        docker push gcr.io/weddinggift/weddinggift:${{ github.sha }}

    - name: Deploy para Cloud Run
      run: |
        gcloud run deploy weddinggift \
          --image gcr.io/weddinggift/weddinggift:${{ github.sha }} \
          --platform managed \
          --region us-central1 \
          --allow-unauthenticated \
          --set-env-vars "ASPNETCORE_ENVIRONMENT=Production" \
          --max-instances 10 \
          --memory 512Mi
