<!doctype html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{Title}}</title>
</head>
<body style="margin:0;padding:0;background:#f4f5f7;font-family:Arial,Helvetica,sans-serif;color:#252a31;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="background:#f4f5f7;padding:32px 16px;">
        <tr>
            <td align="center">
                <table role="presentation" width="100%" cellspacing="0" cellpadding="0" style="max-width:680px;background:#ffffff;border:1px solid #dde2ea;border-radius:14px;overflow:hidden;">
                    <tr>
                        <td style="background:#253247;padding:24px 30px;">
                            <div style="font-size:12px;letter-spacing:2px;text-transform:uppercase;color:#bac7d8;">Wedding Gift</div>
                            <h1 style="margin:10px 0 0;font-size:22px;line-height:1.3;color:#ffffff;font-weight:700;">{{Title}}</h1>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:28px 30px;">
                            <p style="margin:0 0 16px;font-size:14px;line-height:1.6;color:#586271;">Detalhes capturados pela API:</p>
                            <pre style="margin:0;padding:18px 20px;background:#111827;color:#e5e7eb;border-radius:10px;font-family:Consolas,'Courier New',monospace;font-size:13px;line-height:1.55;white-space:pre-wrap;word-break:break-word;">{{Body}}</pre>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:16px 30px;background:#f8fafc;border-top:1px solid #dde2ea;">
                            <p style="margin:0;font-size:12px;line-height:1.5;color:#697386;">Notificacao automatica do backend. Use estas informacoes para diagnosticar o fluxo no painel, logs ou provedor de pagamento.</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
